name: Backend CD

on:
  push:
    branches:
      - main
      - dev/be

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: gradle 캐싱
        uses: gradle/actions/setup-gradle@v4

      - name: bootJar로 jar 파일 생성
        run: ./gradlew bootJar
        working-directory: backend

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: code-zap
          path: backend/build/libs/*.jar

  deploy_develop:
    needs: build
    environment: develop
    runs-on: develop
    steps:
      - name: Properties 복사
        run: ${{ secrets.RUN_COPY_PROPERTIES }}

      - name: Artifact 다운로드
        uses: actions/download-artifact@v4
        with:
          name: code-zap
          path: ${{ secrets.SPRING_DIRECTORY }}

      - name: 배포
        run: ${{ secrets.RUN_SERVER }}

  deploy_production:
    needs: build
    environment: production
    runs-on:
      - prod_a
      - prod_b
    steps:
      - name: Properties 복사
        run: ${{ secrets.RUN_COPY_PROPERTIES }}

      - name: Artifact 다운로드
        uses: actions/download-artifact@v4
        with:
          name: code-zap
          path: ${{ secrets.SPRING_DIRECTORY }}

      - name: 배포
        run: ${{ secrets.RUN_SERVER }}
